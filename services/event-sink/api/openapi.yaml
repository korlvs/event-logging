openapi: 3.0.3
info:
  title: Event Sink API
  version: 1.0.0
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /events:
    get:
      operationId: listEvents
      parameters:
        - name: source_system
          in: query
          schema: { type: string }
        - name: event_type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: search
          in: query
          description: Поиск по initiator и description
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
                
  /events/{id}:
    get:
      operationId: getEventById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredEvent'
components:
  schemas:
    StoredEvent:
      type: object
      required:
        - id
        - source_system
        - event_time
        - published_time
        - initiator
        - tag
        - event_type
      properties:
        id: { type: string }
        source_system: { type: string }
        event_time: { type: string, format: date-time }
        published_time: { type: string, format: date-time }
        initiator: { type: string }
        state_before: { type: string, nullable: true }
        state_after: { type: string, nullable: true }
        tag: { type: string }
        event_type: { type: string }
        status: { type: string, nullable: true }
        description: { type: string, nullable: true }
        trace_id: { type: string, nullable: true, description: "Опциональный идентификатор трассировки" }
        created_at: { type: string, format: date-time, readOnly: true }

    EventListResponse:
      type: object
      required:
        - items
        - total
        - page
        - page_size
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StoredEvent'
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer